[tools]
pnpm = "latest"
uv = "latest"
node = "22"
python = "3.13"

[tasks.dev-backend]
run = "cd backend && uv run uvicorn app.main:app --reload --port 8000"
description = "Run FastAPI backend dev server"

[tasks.dev-frontend]
run = "cd frontend && pnpm dev"
description = "Run Next.js frontend dev server"

[tasks.dev]
depends = ["dev-backend", "dev-frontend"]
description = "Run both dev servers"

[tasks.test]
description = "Run all backend tests"
run = "cd backend && uv run pytest"

[tasks.test-unit]
description = "Run backend unit tests only"
run = "cd backend && uv run pytest tests/ -m 'not integration and not e2e' -v"

[tasks.test-coverage]
description = "Run tests with coverage report"
run = "cd backend && uv run pytest --cov=app --cov-report=term-missing --cov-report=html"

[tasks.lint]
description = "Lint backend code"
run = "cd backend && uv run ruff check ."

[tasks.lint-fix]
description = "Lint and auto-fix backend code"
run = "cd backend && uv run ruff check --fix ."

[tasks.format]
description = "Format backend code"
run = "cd backend && uv run ruff format ."

[tasks.typecheck]
description = "Type check frontend"
run = "cd frontend && pnpm tsc --noEmit"

[tasks.build]
description = "Build frontend for production"
run = "cd frontend && pnpm build"

[tasks.migrate]
description = "Run database migrations"
run = "cd backend && uv run alembic upgrade head"

[tasks.migrate-create]
description = "Create a new migration"
run = "cd backend && uv run alembic revision --autogenerate -m"

[tasks.db-reset]
description = "Reset database (stamp + upgrade)"
run = "cd backend && uv run alembic stamp head"

[tasks.health]
description = "Check if backend is healthy"
run = "curl -s http://localhost:8000/api/health | python3 -m json.tool"

[tasks.logs]
description = "Tail backend logs"
run = "tail -f backend/logs/app.log 2>/dev/null || echo 'No log file yet — start the backend first'"

# ── Pipeline tasks (run directly against Neon, no HTTP) ───────────────────────

[tasks.regen]
description = "Regenerate a mini in-place. Usage: mise run regen <username>"
run = "cd backend && PYTHONPATH=. uv run python scripts/regen_mini.py"

[tasks.regen-anthropic]
description = "Regenerate a mini with DEFAULT_PROVIDER=anthropic. Usage: mise run regen-anthropic <username>"
run = "cd backend && DEFAULT_PROVIDER=anthropic PYTHONPATH=. uv run python scripts/regen_mini.py"

[tasks.fidelity-eval]
description = "Run fidelity eval against a running backend. Usage: mise run fidelity-eval [subjects]"
run = "cd backend && uv run python scripts/run_fidelity_eval.py --base-url http://localhost:8000"

[tasks.fidelity-test]
description = "Quick voice-fidelity probe against a mini (Anthropic + judge)."
run = "cd backend && uv run python scripts/fidelity_test.py"

[tasks.prompt-diff]
description = "A/B prompt mutation against current Neon data (cheap validator)."
run = "cd backend && uv run python scripts/prompt_diff_test.py"

[tasks.neon-branch]
description = "Create a personal Neon dev branch. Usage: mise run neon-branch <branch-name>"
run = "neonctl branches create --name"

[tasks.pipeline-replay]
description = "Replay pipeline cassette fixtures offline."
run = "cd backend && MINIS_CASSETTE_MODE=replay MINIS_CASSETTE_RUN_ID=default uv run pytest tests/test_pipeline_replay.py -v"

[tasks.pipeline-record]
description = "One-time cassette recording guide: MINIS_CASSETTE_MODE=record OPENAI_API_KEY=... then run the target pipeline command."
run = "echo 'Set MINIS_CASSETTE_MODE=record MINIS_CASSETTE_RUN_ID=<run-id> OPENAI_API_KEY=... and run the pipeline once to capture fixtures.'"
