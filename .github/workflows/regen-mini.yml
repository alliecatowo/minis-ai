name: Regen Mini

# Trigger paths:
#   - push to main when this workflow file changes → auto-fires once on merge
#   - workflow_dispatch                            → manual re-run with a username

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/regen-mini.yml
  workflow_dispatch:
    inputs:
      username:
        description: GitHub username of the mini to regenerate
        required: true
        default: alliecatowo
      mode:
        description: Regen mode (incremental | fresh | full)
        required: false
        default: incremental

# Never run two regens at once — they share the same prod DB rows.
concurrency:
  group: regen-mini-${{ github.event.inputs.username || 'alliecatowo' }}
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    env:
      DEFAULT_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      JWT_SECRET: ${{ secrets.SERVICE_JWT_SECRET }}
      SERVICE_JWT_SECRET: ${{ secrets.SERVICE_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install neonctl
        run: npm install -g neonctl

      - name: Resolve Neon connection string
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_DATABASE_URL_FALLBACK: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${NEON_API_KEY:-}" ] && [ -n "${NEON_PROJECT_ID:-}" ]; then
            NEON_DATABASE_URL=$(neonctl connection-string production --project-id "${NEON_PROJECT_ID}")
          elif [ -n "${NEON_DATABASE_URL_FALLBACK:-}" ]; then
            NEON_DATABASE_URL="${NEON_DATABASE_URL_FALLBACK}"
          else
            echo 'ERROR: Neither Neon API credentials nor fallback connection string available'
            exit 1
          fi
          # Re-export under the env-var names backend/app/db.py prefers.
          echo "NEON_DATABASE_URL=${NEON_DATABASE_URL}" >> "$GITHUB_ENV"
          echo "DATABASE_URL=${NEON_DATABASE_URL}" >> "$GITHUB_ENV"

      - name: Sync backend deps
        run: uv sync

      - name: Verify Alembic head matches code
        run: |
          set -euo pipefail
          uv run alembic current | tee alembic-current.txt
          if ! grep -q '(head)' alembic-current.txt; then
            echo 'ERROR: prod Neon is not at alembic head — abort regen so we do not crash mid-pipeline.'
            exit 1
          fi

      - name: Regenerate mini
        env:
          USERNAME: ${{ github.event.inputs.username || 'alliecatowo' }}
          MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/regen-out
          PYTHONPATH=. uv run python scripts/regen_mini.py "$USERNAME" --mode "$MODE" \
            2>&1 | tee /tmp/regen-out/regen.log

      - name: Smoke check (non-fatal)
        if: always()
        env:
          USERNAME: ${{ github.event.inputs.username || 'alliecatowo' }}
        run: |
          set +e
          status=$(curl -s -o /tmp/regen-out/mini.json -w '%{http_code}' \
            --max-time 30 "https://minis-api.fly.dev/api/minis/$USERNAME")
          echo "GET /api/minis/$USERNAME -> $status"
          head -c 2000 /tmp/regen-out/mini.json || true
          echo

      - name: Upload regen artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regen-${{ github.event.inputs.username || 'alliecatowo' }}-${{ github.run_id }}
          path: /tmp/regen-out
          if-no-files-found: warn
