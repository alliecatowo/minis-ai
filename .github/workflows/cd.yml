name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  migrate:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync backend dependencies
        run: uv sync

      - name: Capture Alembic heads output
        run: |
          set -o pipefail
          uv run alembic heads 2>&1 | tee alembic-heads.txt

      - name: Capture Alembic current output
        run: |
          set -o pipefail
          uv run alembic current 2>&1 | tee alembic-current.txt

      - name: Abort on multiple Alembic heads
        run: |
          set -euo pipefail
          head_count=$(grep -Ec '\(head\)$' alembic-heads.txt || true)
          if [ "$head_count" -gt 1 ]; then
            echo 'ERROR: multiple alembic heads detected, aborting deploy'
            exit 1
          fi

      - name: Capture Alembic history output
        run: |
          set -o pipefail
          uv run alembic history 2>&1 | tee alembic-history.txt

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Upload Alembic history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alembic-history
          path: backend/alembic-history.txt
          if-no-files-found: warn

  deploy-backend:
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate Fly configuration
        run: flyctl config validate

      - name: Deploy backend to Fly.io
        run: flyctl deploy --remote-only --wait-timeout 300

  smoke:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test production health endpoint
        run: |
          set -euo pipefail

          if ! response=$(curl --fail --max-time 30 --retry 5 --retry-delay 10 https://minis-api.fly.dev/api/health); then
            echo 'Smoke test failed. To rollback: fly deploy rollback -a minis-api (WARNING: DB migrations already applied — verify before rolling back)'
            exit 1
          fi

          echo "$response"

          if ! echo "$response" | grep -q 'status'; then
            echo 'Smoke test failed. To rollback: fly deploy rollback -a minis-api (WARNING: DB migrations already applied — verify before rolling back)'
            exit 1
          fi
