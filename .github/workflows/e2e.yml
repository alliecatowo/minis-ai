name: e2e

on:
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: e2e/pnpm-lock.yaml

      # ── Install e2e deps ─────────────────────────────────────────────────────
      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium
        working-directory: e2e

      # ── Install frontend deps (needed to start the dev server) ───────────────
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # ── Install backend deps ─────────────────────────────────────────────────
      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: uv sync
        working-directory: backend

      # ── Start servers in background ──────────────────────────────────────────
      - name: Start backend
        run: |
          uv run uvicorn app.main:app --port 8000 &
          echo "Backend PID: $!"
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          JWT_SECRET: test-jwt-secret
          SERVICE_JWT_SECRET: test-service-jwt-secret
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start frontend
        run: |
          pnpm dev &
          echo "Frontend PID: $!"
        working-directory: frontend
        env:
          NEXT_PUBLIC_DEV_AUTH_BYPASS: "true"
          BACKEND_URL: "http://localhost:8000"
          SERVICE_JWT_SECRET: "test-service-jwt-secret"
          # Neon Auth isn't needed for the dev-auth-bypass path
          AUTH_SECRET: "test-auth-secret-for-e2e"

      - name: Wait for servers to be ready
        run: |
          npx --yes wait-on http://localhost:3000 http://localhost:8000/api/health --timeout 60000

      # ── Run Playwright tests ─────────────────────────────────────────────────
      - name: Run Playwright tests
        run: pnpm playwright test
        working-directory: e2e
        env:
          CI: "true"
          E2E_BASE_URL: "http://localhost:3000"
          NEXT_PUBLIC_DEV_AUTH_BYPASS: "true"

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 7
