name: Preview

on:
  pull_request:
    types: [labeled, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for Neon branch naming)'
        required: true
        type: string

env:
  FLY_REGION: iad
  NEON_REGION: aws-us-east-1

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: (github.event_name == 'pull_request' && github.event.label.name == 'preview') || github.event_name == 'workflow_dispatch'
    outputs:
      fly_url: ${{ steps.deploy-backend.outputs.url }}
      neon_branch: ${{ steps.neon-branch.outputs.branch_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Neon branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v5
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: pr-${{ steps.pr.outputs.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          username: neondb_owner

      - name: Diagnose Neon branch capacity failure
        if: failure() && steps.neon-branch.outcome == 'failure'
        run: |
          echo "::error::Neon preview branch creation failed. If the log says 'branches limit exceeded', admin action: delete stale Neon preview branches named pr-* or increase the Neon project branch quota, then rerun this workflow."

      - name: Comment PR with preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr.outputs.number }}';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('## Preview Deployment'));

            const branch = '${{ github.head_ref }}'.replace(/[^a-zA-Z0-9-]/g, '-').toLowerCase();

            const body = `## Preview Deployment

            | Service | URL |
            |---------|-----|
            | **Frontend** | https://preview-${branch}.my-mini.me |
            | **Backend** | https://minis-api.fly.dev (production, uses Neon pr-${prNumber} branch) |
            | **Database** | Neon branch \`pr-${prNumber}\` |

            > Note: Custom domain requires DNS propagation. Vercel preview: https://${{ github.head_ref }}--frontend-red-one-13.vercel.app

            Merging this PR will deploy to production and clean up the Neon branch.`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body
              });
            }

  cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: github.event.action == 'closed'
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
        continue-on-error: true

      - name: Comment PR cleanup
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🧹 Preview resources (Neon branch) have been cleaned up.'
            });
